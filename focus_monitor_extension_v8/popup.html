<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #333;
      background-color: #fff;
    }

    h2 {
      font-size: 18px;
      margin-top: 0;
      color: #4CAF50;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      background-color: #ccc;
      border-radius: 50%;
      display: inline-block;
    }

    .status-dot.active {
      background-color: #4CAF50;
      box-shadow: 0 0 5px rgba(76, 175, 80, 0.5);
    }

    /* 控制区域 */
    .control-section {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
      text-align: center;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: all 0.2s;
    }

    #start-btn {
      background-color: #4CAF50;
      color: white;
    }

    #start-btn:hover {
      background-color: #45a049;
    }

    #stop-btn {
      background-color: #f44336;
      color: white;
      display: none;
    }

    #stop-btn:hover {
      background-color: #d32f2f;
    }

    /* 统计结果区域 */
    #stats-report {
      display: none;
      background: #e8f5e9;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      border: 1px solid #c8e6c9;
    }

    #stats-report h3 {
      margin: 0 0 8px 0;
      font-size: 14px;
      color: #2e7d32;
    }

    .stat-item {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 4px;
      color: #444;
    }

    .stat-value {
      font-weight: bold;
      color: #333;
    }

    /* 设置区域 */
    .settings-section {
      border-top: 1px solid #eee;
      padding-top: 10px;
    }

    .settings-title {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .option {
      margin-bottom: 8px;
      display: flex;
      align-items: center;
    }

    .option input {
      margin-right: 10px;
      cursor: pointer;
    }

    .option label {
      cursor: pointer;
      font-size: 13px;
    }

    #save-settings {
      width: 100%;
      padding: 6px;
      background-color: #eee;
      color: #666;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      margin-top: 5px;
    }

    #save-settings:hover {
      background-color: #e0e0e0;
    }
  </style>
</head>

<body>
  <h2>
    <span>专注监控</span>
    <div id="status-indicator" class="status-dot"></div>
  </h2>

  <div class="control-section">
    <button id="start-btn" class="btn">开始专注</button>
    <button id="stop-btn" class="btn">结束专注</button>
    <div id="timer-display" style="margin-top: 8px; font-size: 12px; color: #666; display: none;">
      正在计时: <span id="current-duration">00:00:00</span>
    </div>
  </div>

  <div id="stats-report">
    <h3>上次监控报告</h3>
    <div class="stat-item"><span>专注时长:</span> <span id="res-duration" class="stat-value">-</span></div>
    <div class="stat-item"><span>标签切换:</span> <span id="res-tabs" class="stat-value">-</span></div>
    <div class="stat-item"><span>域名跳转:</span> <span id="res-domains" class="stat-value">-</span></div>
    <div class="stat-item"><span>离开浏览器:</span> <span id="res-focus" class="stat-value">-</span></div>
  </div>

  <div class="settings-section">
    <div class="settings-title">监控项设置</div>
    <div class="option">
      <input type="checkbox" id="monitorDomain" checked>
      <label for="monitorDomain">监控域名切换</label>
    </div>
    <div class="option">
      <input type="checkbox" id="monitorTab" checked>
      <label for="monitorTab">监控标签切换</label>
    </div>
    <div class="option">
      <input type="checkbox" id="monitorWindow" checked>
      <label for="monitorWindow">监控离开浏览器</label>
    </div>
    <button id="save-settings">保存监控配置</button>
  </div>

  <script src="popup.js"></script>
</body>

</html>
